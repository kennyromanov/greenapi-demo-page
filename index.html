<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Green-API Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <meta id="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="./assets/main.css">
    <script src="https://cdn.jsdelivr.net/npm/axios"></script>
    <script src="https://cdn.jsdelivr.net/npm/@green-api/whatsapp-api-client/lib/whatsapp-api-client.min.js"></script>
    <script type="module" src="./assets/main.js"></script>
</head>
<body>

<div class="container">
    <main id="app" data-loading="0">
        <aside class="controls">
            <div class="controls_group">
                <label>
                    <input type="text" id="id_instance_input" placeholder="idInstance">
                </label>

                <label>
                    <input type="text" id="api_token_instance_input" placeholder="apiTokenInstance">
                </label>
            </div>

            <div class="controls_group">
                <button id="get_settings_button">
                    getSettings
                </button>

                <button id="get_state_instance_button">
                    getStateInstance
                </button>
            </div>

            <div class="controls_group">
                <label>
                    <input
                            type="tel"
                            id="message_phone_number_input"
                            placeholder="77771234567"
                            maxlength="14"
                    >
                </label>

                <label>
                    <input
                            type="text"
                            id="message_text_input"
                            placeholder="Hello World!"
                            maxlength="20000"
                    >
                </label>

                <button id="send_message_button">
                    sendMessage
                </button>
            </div>

            <div class="controls_group">
                <label>
                    <input
                            type="tel"
                            id="file_phone_number_input"
                            placeholder="77771234567"
                            maxlength="14"
                    >
                </label>

                <label>
                    <input
                            type="text"
                            id="file_url_input"
                            placeholder="https://mysite.com/img/horse.png"
                            maxlength="4096"
                    >
                </label>

                <button id="send_file_by_url_button">
                    sendFileByUrl
                </button>
            </div>
        </aside>

        <section class="output">
            <h3>Ответ:</h3>
            <textarea id="response" readonly></textarea>
        </section>
    </main>
</div>

</body>
</html>
